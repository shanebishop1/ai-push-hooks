name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate tag and package versions
        run: |
          python - <<'PY'
          import json
          import tomllib
          import os

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
            raise SystemExit(f"tag must start with v: {tag}")
          tag_version = tag[1:]

          with open("pyproject.toml", "rb") as f:
            pyproject = tomllib.load(f)
          py_version = pyproject["project"]["version"]

          with open("package.json", "r", encoding="utf-8") as f:
            package = json.load(f)
          npm_version = package["version"]

          if py_version != npm_version:
            raise SystemExit(
              f"version mismatch: pyproject.toml={py_version} package.json={npm_version}"
            )
          if tag_version != py_version:
            raise SystemExit(
              f"tag/version mismatch: tag={tag_version} package={py_version}"
            )

          print(f"release version verified: {py_version}")
          PY

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest build twine

      - name: Run tests
        run: pytest tests -q

      - name: Build Python distributions
        run: python -m build

      - name: Validate Python distributions
        run: python -m twine check dist/*

      - name: Smoke-test installed Python CLI
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          pip install dist/*.whl
          tmp_dir=$(mktemp -d)
          ai-push-hooks --help > /dev/null
          (
            cd "$tmp_dir"
            ai-push-hooks init --template minimal-docs
          )

      - name: Smoke-test npm wrapper
        run: |
          node bin/ai-push-hooks.js --help > /dev/null
          npm pack --dry-run

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download Python dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Record npm deployment status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          ref = os.environ["GITHUB_REF_NAME"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          deployment_payload = {
              "ref": ref,
              "environment": "npm",
              "description": "npm publish",
              "auto_merge": False,
              "transient_environment": False,
              "production_environment": False,
              "required_contexts": [],
          }
          deployment_request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/deployments",
              data=json.dumps(deployment_payload).encode("utf-8"),
              headers=headers,
              method="POST",
          )
          with urllib.request.urlopen(deployment_request) as response:
              deployment = json.load(response)

          status_payload = {
              "state": "success",
              "log_url": run_url,
              "description": "npm publish successful",
          }
          status_request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/deployments/{deployment['id']}/statuses",
              data=json.dumps(status_payload).encode("utf-8"),
              headers=headers,
              method="POST",
          )
          with urllib.request.urlopen(status_request):
              pass

          print(f"Recorded npm deployment {deployment['id']} as success")
          PY
